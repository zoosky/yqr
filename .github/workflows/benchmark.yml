name: Continuous Benchmarking

# Runs the criterion benchmark suite on merge to main and tracks results over
# time, alerting if a commit regresses performance. Only triggers on
# Rust-relevant changes; never runs on PRs.
on:
  push:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/benchmark.yml"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Criterion benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (1.96)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96"

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-bench-

      - name: Run benchmarks
        run: |
          cargo bench --bench eval --locked -- --output-format bencher | tee bench-full.txt
          grep -E '^test .+ bench:' bench-full.txt > bench-output.txt || true

      - name: Store result and alert on regressions
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: bench-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "130%"
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: dev/bench
